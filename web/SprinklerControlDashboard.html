        function updateBinaryValue(channelId) {
            const labels = ['SleeepEn', 'PumpEn', 'NightSlp', 'LeveChk', 'BattChk'];
            let binaryValue = 1;

            labels.forEach((label, index) => {
                const checkbox = document.getElementById(`channel_${channelId}_${label}`);
                if (checkbox.checked) {
                    binaryValue |= (1 << index+1); // Set the bit at the correct position
                }
            });

            const input = document.getElementById(`channel_${channelId}_field_3`);
            input.value = binaryValue;
        }

            updateCheckboxes(channel.id, feeds.field3);

        // Add event listeners to update field_4 when wake/sleep change
    function updateField4() {
        const wake = parseInt(wakeHInput.value, 10);
        const sleep = parseInt(sleepHInput.value, 10);
        if (
            !isNaN(wake) && !isNaN(sleep) &&
            wake >= 1 && wake <= 12 &&
            sleep >= 1 && sleep <= 24
        ) {
            field4Input.value = (12 * (sleep - 1)) + wake;
        }
    }
    wakeHInput.addEventListener('input', updateField4);
    sleepHInput.addEventListener('input', updateField4);
}

        function updateCheckboxes(channelId, value) {
            const labels = ['SleeepEn', 'PumpEn', 'NightSlp', 'LeveChk', 'BattChk'];
            const binaryValue = parseInt(value, 10);

            labels.forEach((label, index) => {
                const checkbox = document.getElementById(`channel_${channelId}_${label}`);
                checkbox.checked = (binaryValue & (2 << index)) !== 0;
            });
        }

        function writeChannel(channel) {
            const fields = {};
            for (let i = 1; i <= 8; i++) {
                fields[`field${i}`] = document.getElementById(`channel_${channel.id}_field_${i}`).value;
            }

            const url = `https://api.thingspeak.com/update?api_key=${channel.wapiKey}`;
            const params = new URLSearchParams(fields);

            fetch(url, {
                method: 'POST',
                body: params
            })
                .then(response => response.json())
                .then(data => console.log('Channel updated:', data))
                .catch(error => console.error('Error writing channel:', error));
        }

        function fetchDchanStatusAndCreatedAt(channel) {
            const statusSpan = document.getElementById(`channel_${channel.id}_dchan_status`);
            const createdAtSpan = document.getElementById(`channel_${channel.id}_dchan_created_at`);

            if (!channel.dchan) {
                if (statusSpan) statusSpan.textContent = 'N/A (no dchan)';
                if (createdAtSpan) createdAtSpan.textContent = 'N/A';
                return;
            }

            // Use channel.dchan for ID and main channel's rapiKey
            const url = `https://api.thingspeak.com/channels/${channel.dchan}/feeds.json?api_key=${channel.rapiKey}&results=1&status=true`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status} for dchan ${channel.dchan}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.feeds && data.feeds.length > 0) {
                        const latestFeed = data.feeds[0];
                        if (statusSpan) {
                            statusSpan.textContent = latestFeed.status !== undefined ? latestFeed.status : 'N/A';
                        }
                        if (createdAtSpan) {
                            createdAtSpan.textContent = latestFeed.created_at ? new Date(latestFeed.created_at).toLocaleString() : 'N/A';
                        }
                    } else {
                        if (statusSpan) statusSpan.textContent = 'No data';
                        if (createdAtSpan) createdAtSpan.textContent = 'No data';
                    }
                })
                .catch(error => {
                    console.error(`Error reading dchan (${channel.dchan}) status/timestamp:`, error);
                    if (statusSpan) statusSpan.textContent = 'Error';
                    if (createdAtSpan) createdAtSpan.textContent = 'Error';
                });
        }

        // ===================== Valve Control Section =====================
        // field1: valve order, one digit per valve, e.g. "1234" (order can
        //         be shuffled, e.g. "4213")
        // field2: start times, one HHmm (4-digit, 24hr) per valve, colon
        //         separated, e.g. "0600:0730:0900:1015"
        // field3: mode, a plain integer (not a bitmask)
        // field4: durations in minutes, one 3-digit mmm per valve, colon
        //         separated, e.g. "030:045:060:090"
        // The Nth valve number in field1 lines up with the Nth start time
        // in field2 and the Nth duration in field4.

        function padTime(value) {
            // "6:00" -> "0600"
            const digits = value.replace(':', '');
            return digits.padStart(4, '0');
        }

        function timeDigitsToInputValue(digits) {
            // "0600" -> "06:00" for an <input type="time">
            if (!digits || digits.length < 4) return '';
            return `${digits.slice(0, 2)}:${digits.slice(2, 4)}`;
        }

        function padDuration(value) {
            const digits = String(parseInt(value, 10) || 0);
            return digits.padStart(3, '0');
        }

            row.appendChild(valveTd);

            const startTd = document.createElement('td');
            const startInput = document.createElement('input');
            startInput.type = 'time';
            startInput.value = timeDigitsToInputValue(startTimeDigits);
            startTd.appendChild(startInput);
            row.appendChild(startTd);

            const durationTd = document.createElement('td');
            const durationInput = document.createElement('input');
            durationInput.type = 'number';
            durationInput.min = '0';
            durationInput.max = '999';
            durationInput.value = durationDigits ? parseInt(durationDigits, 10) : '';
            durationTd.appendChild(durationInput);
            durationTd.appendChild(document.createTextNode(' min'));
            row.appendChild(durationTd);

            const removeTd = document.createElement('td');
            const removeButton = document.createElement('button');
            removeButton.textContent = 'Remove';
            removeButton.className = 'valve-remove-row-btn';
            removeButton.onclick = () => row.remove();
            removeTd.appendChild(removeButton);
            row.appendChild(removeTd);

            row.dataset.valveInput = '';
            row._inputs = { valveInput, startInput, durationInput };
            tbody.appendChild(row);
            return row;
        }

        function writeValve(valve) {
            const tbody = document.getElementById(`valve_${valve.channelId}_tbody`);
            const modeInput = document.getElementById(`valve_${valve.channelId}_mode`);
            const battMinInput = document.getElementById(`valve_${valve.channelId}_battMin`);
            const levelMinInput = document.getElementById(`valve_${valve.channelId}_levelMin`);

            const valveNumbers = [];
            const startTimes = [];
            const durations = [];

            Array.from(tbody.rows).forEach(row => {
                const { valveInput, startInput, durationInput } = row._inputs;
                if (!valveInput.value) return;
                valveNumbers.push(valveInput.value.trim());
                startTimes.push(padTime(startInput.value || '0000'));
                durations.push(padDuration(durationInput.value));
            });

            const fields = {
                field1: valveNumbers.join(''),
                field2: startTimes.join(':'),
                field3: modeInput.value || '0',
                field4: durations.join(':'),
                field5: battMinInput.value || '0',
                field6: levelMinInput.value || '0'
            };

            const url = `https://api.thingspeak.com/update?api_key=${valve.writeAPIKey}`;
            const params = new URLSearchParams(fields);

            fetch(url, {
                method: 'POST',
                body: params
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Valve schedule updated:', data);
                    // Give ThingSpeak a moment to propagate the write, then
                    // refresh from the read channel to confirm.
                    setTimeout(() => readValve(valve), 3000);
                })
                .catch(error => console.error('Error writing valve schedule:', error));
        }

        function readValve(valve) {
            const updatedTd = document.getElementById(`valve_${valve.channelId}_updated`);
            const modeInput = document.getElementById(`valve_${valve.channelId}_mode`);
            const battMinInput = document.getElementById(`valve_${valve.channelId}_battMin`);
            const levelMinInput = document.getElementById(`valve_${valve.channelId}_levelMin`);
            const tbody = document.getElementById(`valve_${valve.channelId}_tbody`);

            fetch(`https://api.thingspeak.com/channels/${valve.channelId}/feeds.json?api_key=${valve.readAPIKey}&results=1`)
                .then(response => response.json())
                .then(data => {
                    const feeds = data.feeds && data.feeds[0];
                    if (!feeds) {
                        if (updatedTd) updatedTd.textContent = 'No data';
                        return;
                    }

                    const valveNumbers = (feeds.field1 || '').split('');
                    const startTimes = (feeds.field2 || '').split(':');
                    const durations = (feeds.field4 || '').split(':');

                    if (modeInput) modeInput.value = feeds.field3 !== null ? feeds.field3 : '';
                    if (battMinInput) battMinInput.value = feeds.field5 !== null ? feeds.field5 : '';
                    if (levelMinInput) levelMinInput.value = feeds.field6 !== null ? feeds.field6 : '';

                    if (tbody) {
                        tbody.innerHTML = '';
                        const rowCount = Math.max(valveNumbers.length, startTimes.length, durations.length);
                        for (let i = 0; i < rowCount; i++) {
                            addValveRow(tbody, valveNumbers[i], startTimes[i], durations[i]);
                        }
                    }

                    if (updatedTd) {
                        updatedTd.textContent = feeds.created_at ? new Date(feeds.created_at).toLocaleString() : 'N/A';
                    }
                })
                .catch(error => {
                    console.error('Error reading valve schedule:', error);
                    if (updatedTd) updatedTd.textContent = 'Error';
                });
        }

        function initValves() {
            const valveContainer = document.getElementById('valveControls');
            valveChannels.forEach(valve => {
                const panel = createValvePanel(valve);
                valveContainer.appendChild(panel);
                readValve(valve);
            });
        }
        // =================== End Valve Control Section ====================

        function init() {
            const channelsContainer = document.getElementById('channels');
            channels.forEach(channel => {
                const table = createTable(channel);
                channelsContainer.appendChild(table);
                readChannel(channel); // Call readChannel for each channel on page load
                fetchDchanStatusAndCreatedAt(channel); // Fetch and display dchan status and created_at
            });
            initValves();
        }
//just a comment 
        // Chart iframes get their `src` set here instead of at creation
        // time. If we set `src` immediately, the browser's tab spinner
        // waits for every chart (15 total) to finish loading before it
        // stops. Deferring the src assignment until after window 'load'
        // has already fired lets the page report itself as loaded almost
        // immediately, then the charts stream in afterward without
        // re-triggering the spinner.
        function loadDeferredIframes() {
            document.querySelectorAll('iframe[data-src]').forEach(iframe => {
                iframe.src = iframe.dataset.src;
                iframe.removeAttribute('data-src');
            });
        }

        if (document.readyState === 'complete') {
            // window 'load' already fired before this script ran; load
            // charts immediately instead of waiting for an event that
            // already happened.
            loadDeferredIframes();
        } else {
            window.addEventListener('load', loadDeferredIframes);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
